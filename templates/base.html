<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 min-height-screen flex flex-col relative overflow-x-hidden">

    <div class="fixed w-[500px] h-[500px] rounded-full bg-blue-600/10 blur-[120px] top-[-100px] left-[-100px] -z-10"></div>
    <div class="fixed w-[400px] h-[400px] rounded-full bg-cyan-500/10 blur-[120px] bottom-[-50px] right-[-50px] -z-10"></div>

    <nav class="sticky top-0 z-50 flex justify-between items-center px-8 py-5 bg-[#1e293b]/80 backdrop-blur-xl border-b-2 border-cyan-400 shadow-lg shadow-black/20">
        <div class="text-2xl font-bold tracking-wider">Het<span class="text-cyan-400">Mehta</span></div>
        <ul class="flex gap-8 font-semibold">
            <li><a href="/" class="hover:text-cyan-400 transition-colors duration-300">Home</a></li>
            <li><a href="/about" class="hover:text-cyan-400 transition-colors duration-300">About</a></li>
            <li><a href="/skills" class="hover:text-cyan-400 transition-colors duration-300">Skills</a></li>
            <li><a href="/projects" class="hover:text-cyan-400 transition-colors duration-300">Projects</a></li>
            <li><a href="/contact" class="hover:text-cyan-400 transition-colors duration-300">Contact</a></li>
        </ul>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-20">
        {% block body %}
        {% endblock %}
    </main>

    <footer class="bg-[#030712] border-t-2 border-blue-500 text-center py-10 relative z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <h3 class="text-lg font-semibold tracking-wide">Connect With Me</h3>
        <div class="my-5 flex justify-center gap-6">
            <a href="https://instagram.com/hetmehta46" target="_blank" class="text-2xl hover:text-cyan-400 hover:-translate-y-1 transition-all duration-300"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/919157138711" target="_blank" class="text-2xl hover:text-cyan-400 hover:-translate-y-1 transition-all duration-300"><i class="fab fa-whatsapp"></i></a>
            <a href="https://github.com/hetmehta189" target="_blank" class="text-2xl hover:text-cyan-400 hover:-translate-y-1 transition-all duration-300"><i class="fab fa-github"></i></a>
        </div>
        <p class="text-sm text-slate-500">© 2026 Het Mehta | Python & Flask Developer</p>
    </footer>

</body>
</html>
